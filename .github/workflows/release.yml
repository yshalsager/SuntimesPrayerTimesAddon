name: Release

on:
  workflow_dispatch:
    inputs:
      create_tag:
        description: 'Create and push a release tag'
        required: true
        default: true
        type: boolean
      dry_run:
        description: 'Dry run (skip GitHub Release)'
        required: true
        default: true
        type: boolean
      release:
        description: 'Bump version from last tag and create a release'
        required: true
        default: false
        type: boolean
      bump:
        description: 'Semver bump type (used when release=true)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: 'Optional explicit version (e.g. 0.2.0). Overrides bump calculation when set.'
        required: false
        type: string
      target:
        description: 'Publish target'
        required: true
        default: izzy
        type: choice
        options:
          - izzy
          - play
          - both
      play_track:
        description: 'Google Play track (used when target includes play)'
        required: true
        default: production
        type: choice
        options:
          - production
          - beta
          - internal
      skip_screenshots:
        description: 'Skip screenshot generation step'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*.*.*'

env:
  MISE_ENV: ci

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      publish_target: ${{ steps.publish_target.outputs.target }}
      publish_izzy: ${{ steps.publish_target.outputs.publish_izzy }}
      checkout_ref: ${{ steps.checkout_ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - uses: jdx/mise-action@v3
        with:
          cache: true
          cache_key_prefix: 'mise-v1'

      - name: Compute version
        id: v
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.release }}" != "true" ]]; then
            VERSION="$(sed -nE "s/^[[:space:]]*versionName[[:space:]]+['\"]([^'\"]+)['\"].*$/\\1/p" app/build.gradle | head -n 1)"
            if [[ -z "$VERSION" ]]; then
              echo "versionName not found in app/build.gradle"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1 || true)
          if [[ -z "$LAST_TAG" ]]; then
            BASE="0.1.0"
          else
            BASE="${LAST_TAG#v}"
          fi

          IFS='.' read -r major minor patch <<<"$BASE"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          VERSION="$major.$minor.$patch"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version files (manual release)
        if: ${{ inputs.release && inputs.create_tag && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os, re
          from pathlib import Path

          version = os.environ['VERSION']
          p = Path("app/build.gradle")
          s = p.read_text()

          m = re.search(r"versionCode\s+(\d+)", s)
          if not m:
            raise SystemExit("versionCode not found in app/build.gradle")
          next_code = int(m.group(1)) + 1

          s = re.sub(r"versionCode\s+\d+", f"versionCode {next_code}", s, count=1)
          s = re.sub(r"versionName\s+['\"][^'\"]+['\"]", f"versionName '{version}'", s, count=1)
          p.write_text(s)
          print(f"versionName={version} versionCode={next_code}")
          PY

      - name: Generate fastlane changelogs
        if: ${{ inputs.release && inputs.create_tag && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION_CODE="$(sed -nE "s/^[[:space:]]*versionCode[[:space:]]+([0-9]+).*$/\\1/p" app/build.gradle | head -n 1)"
          if [[ -z "$VERSION_CODE" ]]; then
            echo "versionCode not found in app/build.gradle"
            exit 1
          fi
          VERSION_CODE="$VERSION_CODE" VERSION="$VERSION" .github/scripts/update_fastlane_changelog.sh

      - name: Commit + tag (manual release)
        if: ${{ inputs.release && inputs.create_tag && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          TAG: ${{ steps.v.outputs.tag }}
          TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle fastlane/metadata/android/en-US/changelogs/*.txt fastlane/metadata/android/ar/changelogs/*.txt
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "target:${TARGET}"

      - name: Push changes (manual release)
        if: ${{ inputs.release && inputs.create_tag && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -euo pipefail
          git push
          git push --tags

      - name: Resolve publish target
        id: publish_target
        env:
          INPUT_TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          set -euo pipefail
          target="izzy"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            tag_note="$(git for-each-ref "refs/tags/$tag" --format='%(contents)' | head -n 1 | tr -d '\r')"
            case "$tag_note" in
              target:play) target="play" ;;
              target:both) target="both" ;;
              target:izzy) target="izzy" ;;
            esac
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${INPUT_TARGET:-}" ]]; then
            target="$INPUT_TARGET"
          fi
          if [[ "$target" == "izzy" || "$target" == "both" ]]; then
            publish_izzy="true"
          else
            publish_izzy="false"
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "publish_izzy=$publish_izzy" >> "$GITHUB_OUTPUT"

      - name: Decide checkout ref
        id: checkout_ref
        env:
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          REF="$GITHUB_REF"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            REF="$GITHUB_REF"
          elif [[ "${{ inputs.release }}" == "true" && "${{ inputs.create_tag }}" == "true" ]]; then
            REF="refs/tags/$TAG"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

  screenshots_refresh:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_screenshots }}
    uses: ./.github/workflows/screenshots.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      create_pr: ${{ github.event_name == 'workflow_dispatch' }}
      base_ref: ${{ github.ref_name }}

  build:
    needs: [version, screenshots_refresh]
    if: ${{ always() && needs.version.result == 'success' && (needs.screenshots_refresh.result == 'success' || needs.screenshots_refresh.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ needs.version.outputs.checkout_ref }}

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - uses: jdx/mise-action@v3
        with:
          cache: true
          cache_key_prefix: 'mise-v1'

      - uses: gradle/actions/setup-gradle@v5

      - name: Verify fastlane changelogs for current versionCode
        shell: bash
        run: |
          set -euo pipefail
          VERSION_CODE="$(sed -nE "s/^[[:space:]]*versionCode[[:space:]]+([0-9]+).*$/\\1/p" app/build.gradle | head -n 1)"
          if [[ -z "$VERSION_CODE" ]]; then
            echo "versionCode not found in app/build.gradle"
            exit 1
          fi
          for locale in en-US ar; do
            file="fastlane/metadata/android/${locale}/changelogs/${VERSION_CODE}.txt"
            if [[ ! -f "$file" ]]; then
              echo "Missing changelog file: $file"
              exit 1
            fi
            if LC_ALL=C grep -P '[^\\x00-\\x7F]' "$file" >/dev/null; then
              echo "Non-ASCII changelog file: $file"
              exit 1
            fi
            size=$(wc -c < "$file")
            if [[ "$size" -gt 500 ]]; then
              echo "Changelog too large ($size > 500): $file"
              exit 1
            fi
          done

      - name: Decode signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          ls -la release-keystore.jks

      - name: Build APKs
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD:-}" || -z "${ANDROID_KEY_ALIAS:-}" || -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "Missing signing secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD"
            exit 1
          fi

          mise x java -- ./gradlew :app:assembleDebug
          mise x java -- ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          mise x java -- ./gradlew :app:bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"

          DEBUG_APK=$(find app/build/outputs/apk/debug -type f -name "*.apk" | head -n 1 || true)
          RELEASE_APK=$(find app/build/outputs/apk/release -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1 || true)
          RELEASE_AAB=$(find app/build/outputs/bundle/release -type f -name "*.aab" | head -n 1 || true)

          if [[ -z "$DEBUG_APK" ]]; then
            echo "No debug APK found"
            exit 1
          fi

          if [[ -z "$RELEASE_APK" ]]; then
            echo "No signed release APK found"
            exit 1
          fi

          if [[ -z "$RELEASE_AAB" ]]; then
            echo "No release AAB found"
            exit 1
          fi

          OUT_DEBUG="PrayerTimesAddon-v$VERSION-debug.apk"
          OUT_RELEASE="PrayerTimesAddon-v$VERSION-release.apk"
          OUT_RELEASE_AAB="PrayerTimesAddon-v$VERSION-release.aab"
          cp "$DEBUG_APK" "$OUT_DEBUG"
          cp "$RELEASE_APK" "$OUT_RELEASE"
          cp "$RELEASE_AAB" "$OUT_RELEASE_AAB"

          echo "apk_debug=$OUT_DEBUG" >> "$GITHUB_OUTPUT"
          echo "apk_release=$OUT_RELEASE" >> "$GITHUB_OUTPUT"
          echo "aab_release=$OUT_RELEASE_AAB" >> "$GITHUB_OUTPUT"
          echo "Debug APK: $OUT_DEBUG"
          echo "Release APK: $OUT_RELEASE"
          echo "Release AAB: $OUT_RELEASE_AAB"

      - name: Verify release APK signature
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "$SDK_ROOT" ]]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME not set"
            exit 1
          fi
          "$SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose "${{ steps.artifacts.outputs.apk_release }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            ${{ steps.artifacts.outputs.apk_debug }}
            ${{ steps.artifacts.outputs.apk_release }}
            ${{ steps.artifacts.outputs.aab_release }}
          if-no-files-found: error
      - name: Decode Google Play service account key
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'play' || inputs.target == 'both') && !inputs.dry_run }}
        shell: bash
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${PLAY_SERVICE_ACCOUNT_JSON:-}" ]]; then
            echo "Missing secret PLAY_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Upload to Google Play
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'play' || inputs.target == 'both') && !inputs.dry_run }}
        shell: bash
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/play-service-account.json
          PLAY_AAB_PATH: ${{ github.workspace }}/${{ steps.artifacts.outputs.aab_release }}
          PLAY_TRACK: ${{ inputs.play_track }}
        run: |
          set -euo pipefail
          bundle exec fastlane android upload_play track:"$PLAY_TRACK" aab:"$PLAY_AAB_PATH"

      - name: Generate release notes (changelogen)
        if: ${{ needs.version.outputs.publish_izzy == 'true' && (github.event_name == 'push' || (inputs.release && inputs.create_tag && !inputs.dry_run)) }}
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          PREV_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -v "^$TAG$" | head -n 1 || true)

          args=(--to "$TAG" --output release_notes.md)
          if [[ -n "$PREV_TAG" ]]; then
            args=(--from "$PREV_TAG" "${args[@]}")
          fi

          npx --yes changelogen@latest "${args[@]}"
          echo "Generated release_notes.md"

      - name: Create GitHub Release
        if: ${{ needs.version.outputs.publish_izzy == 'true' && (github.event_name == 'push' || (inputs.release && inputs.create_tag && !inputs.dry_run)) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: release_notes.md
          files: |
            ${{ steps.artifacts.outputs.apk_debug }}
            ${{ steps.artifacts.outputs.apk_release }}
            ${{ steps.artifacts.outputs.aab_release }}
